<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f0f0f"/>
  <!-- Left panel: raw/messy -->
  <rect x="2" y="2" width="13" height="28" rx="3" fill="#1e1e1e"/>
  <!-- hash symbol lines -->
  <rect x="4" y="7" width="3" height="1.5" rx="0.5" fill="#4b5563"/>
  <rect x="4" y="9" width="3" height="1.5" rx="0.5" fill="#4b5563"/>
  <rect x="8" y="6" width="5" height="1.5" rx="0.5" fill="#6b7280"/>
  <rect x="8" y="9" width="4" height="1.5" rx="0.5" fill="#6b7280"/>
  <rect x="4" y="13" width="9" height="1" rx="0.5" fill="#374151"/>
  <rect x="4" y="15.5" width="7" height="1" rx="0.5" fill="#374151"/>
  <rect x="4" y="18" width="8" height="1" rx="0.5" fill="#374151"/>
  <rect x="4" y="20.5" width="5" height="1" rx="0.5" fill="#374151"/>
  <!-- asterisk dots -->
  <circle cx="5" cy="24" r="0.8" fill="#6b7280"/>
  <circle cx="7.5" cy="24" r="0.8" fill="#6b7280"/>
  <circle cx="10" cy="24" r="0.8" fill="#6b7280"/>
  <!-- Divider -->
  <rect x="15" y="2" width="1" height="28" fill="#2a2a2a"/>
  <!-- Right panel: clean/formatted -->
  <rect x="17" y="2" width="13" height="28" rx="3" fill="#1e1e1e"/>
  <!-- Clean heading -->
  <rect x="19" y="7" width="9" height="2.5" rx="1" fill="#ffffff"/>
  <!-- Clean text lines -->
  <rect x="19" y="13" width="9" height="1.2" rx="0.6" fill="#5b9bf5"/>
  <rect x="19" y="15.5" width="7" height="1.2" rx="0.6" fill="#374151"/>
  <rect x="19" y="18" width="8" height="1.2" rx="0.6" fill="#374151"/>
  <!-- Bullet points -->
  <circle cx="20" cy="22" r="0.8" fill="#2563eb"/>
  <rect x="22" y="21.4" width="5" height="1.2" rx="0.6" fill="#374151"/>
  <circle cx="20" cy="25" r="0.8" fill="#2563eb"/>
  <rect x="22" y="24.4" width="4" height="1.2" rx="0.6" fill="#374151"/>
</svg>
