<body>

<header>
  <h1>Markdown Formatter <span>paste raw, get formatted</span></h1>
  <div class="btn-group">
    <button onclick="clearAll()">Clear</button>
    <button onclick="copyFormatted()">Copy Formatted</button>
    <button class="primary" onclick="copyHTML()">Copy HTML</button>
  </div>
</header>

<div class="container">
  <div class="pane">
    <div class="pane-header">
      Raw Markdown
      <span class="word-count" id="wordCount"></span>
    </div>
    <textarea id="input" placeholder="Paste your raw markdown here...&#10;&#10;All those **asterisks** and ## headers from Claude Code / Codex will render beautifully on the right."></textarea>
  </div>
  <div class="divider"></div>
  <div class="pane">
    <div class="pane-header">Formatted Preview</div>
    <div id="output"></div>
  </div>
</div>

<div class="copy-toast" id="toast">Copied!</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const wordCount = document.getElementById('wordCount');

marked.setOptions({
  breaks: true,
  gfm: true
});

function render() {
  const raw = input.value;
  output.innerHTML = marked.parse(raw);
  const words = raw.trim() ? raw.trim().split(/\s+/).length : 0;
  const chars = raw.length;
  wordCount.textContent = `${words} words · ${chars} chars`;
}

input.addEventListener('input', render);

// Auto-paste from clipboard on focus if empty
input.addEventListener('focus', async () => {
  if (!input.value) {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.length > 10) {
        input.value = text;
        render();
      }
    } catch (e) { /* clipboard permission denied, that's fine */ }
  }
});

function clearAll() {
  input.value = '';
  output.innerHTML = '';
  wordCount.textContent = '';
}

function copyFormatted() {
  const html = output.innerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const item = new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([output.innerText], { type: 'text/plain' }) });
  navigator.clipboard.write([item]).then(() => showToast('Formatted text copied!'));
}

function copyHTML() {
  const html = output.innerHTML;
  navigator.clipboard.writeText(html).then(() => showToast('HTML copied!'));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Demo content
input.value = `# Example: What Claude Code Spits Out

When you copy from **Claude Code** or **Codex**, you get raw markdown like this:

## The Problem

- All the \`**asterisks**\` are visible
- Headers show as \`## Heading\` instead of real headings
- Code blocks look like \`\`\`javascript garbage
- *Italics* show as \`*text*\`

## The Solution

Just **paste it here** and get:

1. Properly rendered headings
2. Bold and italic text that looks right
3. Clean code blocks with syntax highlighting
4. Lists that actually look like lists

> This is a blockquote that would look terrible as raw markdown.

---

### Code Example

\`\`\`javascript
function formatMarkdown(raw) {
  return marked.parse(raw);
}
\`\`\`

| Feature | Raw | Formatted |
|---------|-----|-----------|
| Headers | \`## Text\` | Real heading |
| Bold | \`**text**\` | **text** |
| Links | \`[text](url)\` | [clickable link](https://example.com) |

Paste your own content on the left and watch it transform!`;

render();
</script>
